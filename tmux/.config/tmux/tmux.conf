# --- Prefix ---
unbind C-b
set -g prefix C-s
bind C-s send-prefix

# --- Terminal ---
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-ghostty:RGB"
set -as terminal-overrides ",xterm-ghostty:Smulx=\\E[4::%p1%dm"
set -as terminal-overrides ",xterm-ghostty:Setulc=\\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m"
set -sg escape-time 10
set -g focus-events on

# --- General UX ---
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 100000
set -g set-clipboard on
set -g detach-on-destroy off
set -g display-time 4000

# --- Copy mode ---
setw -g mode-keys vi
bind ç copy-mode
bind à paste-buffer -p
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi C-v send -X rectangle-toggle

# --- Splits ---
bind v split-window -h -c "#{pane_current_path}"
bind h split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# --- Pane navigation ---
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
  | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)$'"
bind -n C-h if-shell "$is_vim" 'send-keys C-h' 'select-pane -L'
bind -n C-j if-shell "$is_vim" 'send-keys C-j' 'select-pane -D'
bind -n C-k if-shell "$is_vim" 'send-keys C-k' 'select-pane -U'
bind -n C-l if-shell "$is_vim" 'send-keys C-l' 'select-pane -R'
bind -T copy-mode-vi C-h select-pane -L
bind -T copy-mode-vi C-j select-pane -D
bind -T copy-mode-vi C-k select-pane -U
bind -T copy-mode-vi C-l select-pane -R

# --- Resize mode ---
bind R switch-client -T resize \; display-message "Resize — hjkl / esc"
bind -T resize h resize-pane -L 5 \; switch-client -T resize
bind -T resize j resize-pane -D 5 \; switch-client -T resize
bind -T resize k resize-pane -U 5 \; switch-client -T resize
bind -T resize l resize-pane -R 5 \; switch-client -T resize
bind -T resize Escape switch-client -T root
bind -T resize q      switch-client -T root

# --- Popup terminal ---
set-hook -g session-created "if-shell -F '#{m:pop_*,#{session_name}}' 'set-option status off'"
bind ù if-shell -F '#{m:pop_shell_*,#{session_name}}' \
  'detach-client' \
  'display-popup -E -d "#{pane_current_path}" -w 80% -h 80% "tmux new-session -A -s pop_shell$(pwd | tr / _)"'

# --- Reload ---
bind r source-file ~/.config/tmux/tmux.conf \; display "tmux.conf reloaded"

# --- Appearance ---
set -g status-position top
set -g status-justify left
set -g status-style "bg=default,fg=#6e738d"
set -g status-left "#[fg=#eed49f,bold]#{?window_zoomed_flag,   , }#{?#{==:#{client_key_table},resize}, RESIZE  ,}#[default]"
set -g status-left-length 60
set -g window-status-format "#[fg=#6e738d] #I #W "
set -g window-status-current-format "#[fg=#f5bde6,bold] #I #W "
set -g status-right "#[fg=#6e738d]#(~/.config/tmux/cwd.sh '#{pane_current_path}')  #[bold]#S "

set -g message-style "bg=default,fg=#9399b3"
set -g message-command-style "bg=default,fg=#6e738d"
set -g prompt-cursor-colour "#f4dbd6"
set -g prompt-cursor-style default

set -g pane-border-style "fg=#494d64"
set -g pane-active-border-style "fg=#494d64"

set -g popup-border-lines rounded
set -g popup-border-style 'fg=#494d64'
